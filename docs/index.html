<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceBot - Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid #21262d;
        }
        h1 { font-size: 2.5rem; color: #58a6ff; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1.1rem; color: #8b949e; }
        section { padding: 2rem 0; border-bottom: 1px solid #21262d; }
        h2 { color: #58a6ff; margin-bottom: 1.5rem; font-size: 1.5rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #8b949e; }
        input, textarea {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem;
            color: #c9d1d9;
            font-size: 1rem;
        }
        textarea {
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2ea043; }
        
        #runs-list {
            list-style: none;
            margin-top: 1rem;
        }
        .run-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: border-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .run-item:hover { border-color: #58a6ff; }
        .run-id { font-family: 'Courier New', monospace; color: #58a6ff; }
        .run-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .run-status.queued { background: #8957e5; color: #fff; }
        .run-status.running { background: #1f6feb; color: #fff; }
        .run-status.completed { background: #238636; color: #fff; }
        .run-status.failed { background: #da3633; color: #fff; }

        #run-details {
            margin-top: 1.5rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
        }
        #run-details h3 {
             color: #58a6ff; 
             margin-bottom: 1rem;
             border-bottom: 1px solid #30363d;
             padding-bottom: 0.5rem;
        }
        #run-details pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #0d1117;
            padding: 1rem;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }
        .footer {
            text-align: center;
            padding: 2rem 0;
            color: #484f58;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TraceBot Control Panel</h1>
            <p class="subtitle">Monitor and trigger automated analysis runs.</p>
        </header>

        <section id="control-section">
            <h2>New Run</h2>
            <div class="form-group">
                <label for="repo-path">Repository Path (optional)</label>
                <input type="text" id="repo-path" placeholder="Defaults to the path set in TRACEBOT_REPO_PATH">
            </div>
            <div class="form-group">
                <label for="target-files">Target Files (optional, one per line)</label>
                <textarea id="target-files" placeholder="e.g., my_module/my_file.py&#10;another_module/utils.py"></textarea>
            </div>
            <button id="run-button">Trigger Run</button>
        </section>

        <section id="runs-section">
            <h2>Runs</h2>
            <ul id="runs-list"></ul>
        </section>
        
        <section id="details-section" style="display: none;">
            <h2>Run Details</h2>
            <div id="run-details">
                <h3 id="details-run-id"></h3>
                <p><strong>Status:</strong> <span id="details-status"></span></p>
                <p><strong>Current Step:</strong> <span id="details-step"></span></p>
                <h3>Summary</h3>
                <pre id="details-summary"></pre>
            </div>
        </section>

        <div class="footer">
            <p>TraceBot | Developed by Team NeoDev</p>
        </div>
    </div>

    <script>
        const runButton = document.getElementById('run-button');
        const repoPathInput = document.getElementById('repo-path');
        const targetFilesInput = document.getElementById('target-files');
        const runsList = document.getElementById('runs-list');
        const detailsSection = document.getElementById('details-section');
        const detailsRunId = document.getElementById('details-run-id');
        const detailsStatus = document.getElementById('details-status');
        const detailsStep = document.getElementById('details-step');
        const detailsSummary = document.getElementById('details-summary');

        const API_BASE_URL = window.location.origin;

        async function fetchRuns() {
            try {
                const response = await fetch(`${API_BASE_URL}/runs`);
                const runs = await response.json();
                renderRuns(runs);
            } catch (error) {
                console.error('Error fetching runs:', error);
            }
        }

        function renderRuns(runs) {
            runsList.innerHTML = '';
            runs.sort((a,b) => b.run_id.localeCompare(a.run_id)); // simple sort
            for (const run of runs) {
                const li = document.createElement('li');
                li.className = 'run-item';
                li.dataset.runId = run.run_id;
                li.innerHTML = `
                    <div>
                        <span class="run-id">${run.run_id}</span>
                        <br>
                        <span>${run.current_step}</span>
                    </div>
                    <span class="run-status ${run.status}">${run.status}</span>
                `;
                li.addEventListener('click', () => showRunDetails(run.run_id));
                runsList.appendChild(li);
            }
        }
        
        async function showRunDetails(runId) {
            try {
                const response = await fetch(`${API_BASE_URL}/run/${runId}`);
                const run = await response.json();
                
                detailsRunId.textContent = `Run ID: ${run.run_id}`;
                detailsStatus.textContent = run.status;
                detailsStep.textContent = run.current_step;
                detailsSummary.textContent = run.summary || 'No summary available yet.';
                
                detailsStatus.className = `run-status ${run.status}`;

                detailsSection.style.display = 'block';
                window.scrollTo({ top: detailsSection.offsetTop - 20, behavior: 'smooth' });

            } catch (error) {
                console.error(`Error fetching details for run ${runId}:`, error);
            }
        }

        async function triggerRun() {
            const repoPath = repoPathInput.value.trim();
            const targetFiles = targetFilesInput.value.trim().split('
').filter(f => f);

            const body = {};
            if (repoPath) {
                body.repo_path = repoPath;
            }
            if (targetFiles.length > 0) {
                body.target_files = targetFiles;
            }
            
            runButton.disabled = true;
            runButton.textContent = 'Triggering...';

            try {
                const response = await fetch(`${API_BASE_URL}/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(body),
                });
                if (response.ok) {
                    await fetchRuns();
                    repoPathInput.value = '';
                    targetFilesInput.value = '';
                } else {
                    const error = await response.json();
                    alert(`Error: ${error.detail}`);
                }
            } catch (error) {
                console.error('Error triggering run:', error);
                alert('An error occurred while triggering the run.');
            } finally {
                runButton.disabled = false;
                runButton.textContent = 'Trigger Run';
            }
        }

        runButton.addEventListener('click', triggerRun);

        // Fetch runs on page load and then every 3 seconds
        fetchRuns();
        setInterval(fetchRuns, 3000);
    </script>
</body>
</html>
